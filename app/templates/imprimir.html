{% extends 'base.html' %}

{% block contenido %}
<h2 style="color: #003366; margin-bottom: 20px;">Imprimir Etiquetas QR</h2>

<div style="background-color: white; border-radius: 10px; padding: 25px;
            box-shadow: 0 2px 8px rgb(0,0,0,0.1); max-width: 600px;">
    <p style="color: #555; margin-bottom: 15px;">
        Escanea o escribe los seriales de los equipos para generar las etiquetas QR.
    </p>

    <!--CAMPO DE ESNTRADA-->
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <input type="text" id="input-serial"
               placeholder="Escanea o escribe el serial..."
               style="flex: 1; padding: 10px; border: 2px solid #003366;
                       border-radius: 5px; font-size: 14px;"
               onkeypress="if(event.key === 'Enter') agregarSerial()">
        <button onclick="agregarSerial()"
                style="background-color: #003366; color: white; padding: 10px 20px;
                       border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
            Agregar
        </button>
    </div>

    <!--LISTA DE SERIALES-->
    <div id="lista-seriales" style="margin-bottom: 20px;">
        <p style="color: #888; font-size: 13px;" id="mensaje-vacio">
            No hay seriales agregados aun.
        </p>
    </div>

    <!--CONTADOR-->
    <p style="color: #003366; font-weight: bold; margin-bottom: 15px;">
        Total: <span id="contador">0</span> etiqueta(s)
    </p>

    <!--BOTONES-->
    <div style="display: flex; gap: 10px;">
        <button onclick="generarPDF()"
                style="background-color: #003366; color: white; padding: 10px 25px;
                       border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
                Generar PDF
    </button>
        <button onclick="limpiarLista()"
                style="background-color: #888; color: white; padding: 10px 25px;
                       border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">
                Limpiar
        </button>
    </div>
</div>

<script>
    let seriales = [];

    function agregarSerial() {
        const input = document.getElementById('input-serial');
        const serial = input.value.trim().toUpperCase();

        if (!serial) return;
        if (seriales.includes(serial)) {
            alert('Este serial ya esta en la lista.');
            input.value = '';
            return;
        }

        seriales.push(serial);
        input.value = '';
        input.focus();
        actualizarLista();
    }

    function eliminarSerial(serial) {
        seriales = serial.filter(s => s !== serial);
        actualizarLista();
    }

    function actualizarLista() {
        const lista = document.getElementById('lista-seriales');
        const contador = document.getElementById('contador');
        const mensajeVacio = document.getElementById('mensaje-vacio');

        contador.innerText = seriales.length;

        if (seriales.length === 0) {
            lista.innerHTML = '<p style="color: #888; font-size: 13px;">No hay seriales afregados aun.</p>';
            return;
        }

        lista.innerHTML = seriales.map(s => `
            <div style="display: flex; justify-content: space-between; aling-item: center;
                        padding: 8px 12px; background: #f0f5ff; border-radius: 5px; margin-buttom: 5px;">
                <span style="font-family: monospace; color: #003366;">${s}</span>
                <button onclick="eliminarSerial('${s}')"
                        style="background: none; border: none; color: #cc0000;
                               cursor: pointer; font-size: 16px;">X</button>
            </div>
        `).join('');
    }

    function limpiarLista() {
        seriales = [];
        actualizarLista();
    }

    function generarPDF() {
        if (seriales.length === 0) {
            alert('Agrega al menos un serial.');
            return;
        }
        const params = seriales.map(s => `seriales=${encodeURIComponent(s)}`).join('&');
        window.open(`/pdf-multiple?${params}`, '_blank');
    }
</script>
{% endblock %}
